<title>Zebra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..700;1,9..144,400&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#EFF1EE;
    --card:#FFFFFF;
    --ink:#202322;
    --muted:#8A918C;
    --line:#E3E6E2;
    --accent:#3B6E4F;
    --danger:#B4533F;
    --shadow:0 1px 2px rgba(32,35,34,.06), 0 6px 18px rgba(32,35,34,.07);
    --shadow-lift:0 2px 4px rgba(32,35,34,.08), 0 14px 34px rgba(32,35,34,.14);
    --sans:"Outfit",ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --display:"Fraunces",Georgia,"Times New Roman",serif;
    --mono:ui-monospace,"SF Mono","Cascadia Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--sans);
    color:var(--ink);
    background:var(--canvas);
    background-image:radial-gradient(rgba(32,35,34,.10) 1px, transparent 1px);
    background-size:26px 26px;
    overflow:hidden;
    overscroll-behavior:none;
    -webkit-font-smoothing:antialiased;
    -webkit-tap-highlight-color:transparent;
  }

  /* ---------- top bar ---------- */
  header{
    position:fixed;top:0;left:0;right:0;z-index:5000;
    height:calc(60px + env(safe-area-inset-top));
    padding:env(safe-area-inset-top) calc(18px + env(safe-area-inset-right)) 0 calc(18px + env(safe-area-inset-left));
    display:flex;align-items:center;gap:14px;
    pointer-events:none;
  }
  header > *{pointer-events:auto}
  .brand{display:flex;align-items:center;gap:9px;user-select:none}
  .sync-dot{
    width:7px;height:7px;border-radius:50%;background:var(--muted);
    margin-left:2px;flex:none;transition:background .3s ease;
  }
  .sync-dot.ok{background:var(--accent)}
  .sync-dot.saving{background:#B07A1E;animation:syncpulse 1s ease-in-out infinite}
  .sync-dot.offline{background:var(--danger)}
  @keyframes syncpulse{0%,100%{opacity:1}50%{opacity:.35}}
  .brand img{height:30px;width:auto;display:block}
  .wordmark{
    font-family:var(--display);font-size:23px;font-weight:600;letter-spacing:.01em;
    color:var(--ink);line-height:1;
  }
  .spacer{flex:1}
  button{
    font-family:var(--sans);font-size:13px;color:var(--ink);
    background:var(--card);border:1px solid var(--line);border-radius:8px;
    padding:7px 14px;cursor:pointer;box-shadow:var(--shadow);
    transition:transform .18s cubic-bezier(.2,.8,.2,1), box-shadow .18s ease, background .18s ease, color .18s ease;
  }
  button:active{transform:scale(.95)}
  button:hover{transform:translateY(-1px);box-shadow:var(--shadow-lift)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  button.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
  .archive-count{
    font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:6px;
  }

  /* ---------- board ---------- */
  #board{position:fixed;inset:0;overflow:hidden}

  /* ---------- card ---------- */
  .card{
    position:absolute;width:264px;background:var(--card);
    border:1px solid var(--line);border-radius:12px;
    box-shadow:var(--shadow);
    display:flex;flex-direction:column;
    touch-action:none;min-width:200px;min-height:90px;max-width:560px;
    transition:box-shadow .2s ease, transform .18s cubic-bezier(.2,.8,.2,1);
    animation:cardIn .34s cubic-bezier(.2,.9,.25,1) both;
  }
  @keyframes cardIn{
    from{opacity:0;transform:scale(.92) translateY(8px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }
  .card.removing{
    animation:cardOut .26s cubic-bezier(.4,0,1,1) both;pointer-events:none;
  }
  @keyframes cardOut{
    to{opacity:0;transform:scale(.9) translateY(6px)}
  }
  .card.dragging{box-shadow:var(--shadow-lift);cursor:grabbing;transition:box-shadow .15s ease}
  .card:hover{box-shadow:var(--shadow-lift)}
  .card-scroll{overflow-y:auto;flex:1}
  .resize-handle{
    position:absolute;right:2px;bottom:2px;width:16px;height:16px;
    cursor:nwse-resize;color:var(--muted);opacity:.5;
  }
  .resize-handle:hover{opacity:1}
  .resize-handle svg{width:16px;height:16px;stroke:currentColor;stroke-width:1.6;fill:none;stroke-linecap:round}

  /* per-card peek: recently checked-off items */
  .peek{margin:0 10px;border-top:1px dashed var(--line);padding:6px 4px 2px;display:none}
  .peek.open{display:block}
  .peek-row{
    display:flex;align-items:center;gap:8px;font-size:12.5px;
    color:var(--muted);padding:3px 4px;
  }
  .peek-row .txt{flex:1;text-decoration:line-through;word-break:break-word}
  .peek-empty{font-size:12px;color:var(--muted);padding:4px;font-style:italic}
  .card-head{
    display:flex;align-items:center;gap:6px;
    padding:10px 10px 4px 14px;cursor:grab;
  }
  .card-title{
    flex:1;border:none;background:transparent;font:inherit;
    font-size:14px;font-weight:600;color:var(--ink);min-width:0;
  }
  .card-title::placeholder{color:var(--muted);font-weight:500}
  .card-title:focus{outline:none}
  .icon-btn{
    border:none;background:transparent;box-shadow:none;padding:4px;
    width:26px;height:26px;border-radius:6px;color:var(--muted);
    display:flex;align-items:center;justify-content:center;flex:none;
    transition:background .18s ease, color .18s ease, transform .18s cubic-bezier(.2,.8,.2,1);
  }
  .icon-btn:hover{background:rgba(255,255,255,.6);color:var(--ink);transform:scale(1.08);box-shadow:none}
  .icon-btn:active{transform:scale(.9)}
  .icon-btn.confirm{color:#fff;background:var(--danger);font-family:var(--mono);font-size:10px;width:auto;padding:4px 8px}
  .icon-btn svg{width:15px;height:15px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}

  .card-img-wrap{position:relative;margin:6px 10px 2px}
  .card-img-wrap img{display:block;width:100%;border-radius:8px}
  .img-remove{
    position:absolute;top:6px;right:6px;background:rgba(32,35,34,.72);
    color:#fff;border:none;box-shadow:none;
  }
  .img-remove:hover{background:rgba(32,35,34,.9);color:#fff}

  .items{list-style:none;padding:4px 6px 0}
  .item{
    display:flex;align-items:flex-start;gap:9px;padding:5px 8px;
    border-radius:7px;font-size:13.5px;line-height:1.45;
    overflow:hidden;transition:background .16s ease;
    animation:itemIn .26s cubic-bezier(.2,.9,.25,1) both;
  }
  @keyframes itemIn{
    from{opacity:0;transform:translateY(-4px)}
    to{opacity:1;transform:translateY(0)}
  }
  .item:hover{background:rgba(255,255,255,.5)}
  .check{
    flex:none;width:17px;height:17px;margin-top:2px;border-radius:5px;
    border:1.7px solid var(--muted);background:transparent;cursor:pointer;
    padding:0;box-shadow:none;position:relative;
    transition:border-color .16s ease, background .16s ease, transform .16s cubic-bezier(.2,.8,.2,1);
  }
  .check:hover{border-color:var(--accent);transform:scale(1.12);box-shadow:none}
  .check:active{transform:scale(.9)}
  .check::after{
    content:"";position:absolute;left:4.5px;top:1px;
    width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;
    transform:rotate(45deg) scale(0);transform-origin:center;
    transition:transform .18s cubic-bezier(.6,1.6,.5,1);
  }
  .item-text{flex:1;word-break:break-word;padding-top:1px}

  /* check-off animation: fill → strike → collapse away */
  .item.done .check{background:var(--accent);border-color:var(--accent)}
  .item.done .check::after{transform:rotate(45deg) scale(1)}
  .item.done .item-text{
    text-decoration:line-through;color:var(--muted);
    transition:color .2s ease;
  }
  .item.done{
    animation:vanish .5s ease forwards;animation-delay:.28s;
  }
  @keyframes vanish{
    to{opacity:0;transform:translateX(24px);max-height:0;
       padding-top:0;padding-bottom:0;margin-top:0;margin-bottom:0;}
  }

  .add-row{display:flex;align-items:center;gap:9px;padding:6px 14px 12px}
  .add-row .dash{color:var(--muted);font-family:var(--mono);font-size:13px;user-select:none}
  .add-input{
    flex:1;border:none;background:transparent;font:inherit;font-size:13.5px;
    color:var(--ink);min-width:0;
  }
  .add-input::placeholder{color:var(--muted)}
  .add-input:focus{outline:none}

  /* ---------- empty state ---------- */
  #empty{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-family:var(--mono);font-size:12px;letter-spacing:.08em;
    pointer-events:none;user-select:none;
  }
  #empty[hidden]{display:none}

  /* ---------- archive panel ---------- */
  #panel, #calPanel{
    position:fixed;top:0;right:0;bottom:0;width:320px;max-width:92vw;z-index:6000;
    background:var(--card);border-left:1px solid var(--line);
    box-shadow:-12px 0 30px rgba(32,35,34,.08);
    transform:translateX(105%);transition:transform .32s cubic-bezier(.3,.9,.3,1);
    display:flex;flex-direction:column;
  }
  #panel.open, #calPanel.open{transform:translateX(0)}

  /* item due-date chip */
  .item-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
  .item-row{display:flex;align-items:center;gap:6px}
  .date-btn{
    border:none;background:transparent;box-shadow:none;padding:2px;
    width:20px;height:20px;border-radius:5px;color:var(--muted);flex:none;
    display:flex;align-items:center;justify-content:center;margin-top:1px;
  }
  .date-btn:hover{background:rgba(255,255,255,.6);color:var(--ink);transform:none;box-shadow:none}
  .date-btn.set{color:var(--accent)}
  .date-btn svg{width:14px;height:14px;stroke:currentColor;stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .due{
    font-family:var(--mono);font-size:10.5px;color:var(--muted);
    display:inline-flex;align-items:center;gap:5px;padding-left:1px;
  }
  .due.soon{color:#B07A1E}
  .due.over{color:var(--danger)}
  .due .clr{cursor:pointer;opacity:.6;font-weight:600}
  .due .clr:hover{opacity:1}

  /* calendar list */
  .cal-day{padding:14px 4px 4px}
  .cal-day h3{
    font-family:var(--mono);font-size:11px;letter-spacing:.06em;
    color:var(--accent);text-transform:uppercase;margin-bottom:6px;
  }
  .cal-row{
    display:flex;align-items:flex-start;gap:8px;padding:8px;
    border:1px solid var(--line);border-radius:8px;margin-bottom:6px;
    cursor:pointer;transition:background .12s;
  }
  .cal-row:hover{background:var(--canvas)}
  .cal-row.over{border-color:var(--danger)}
  .cal-time{font-family:var(--mono);font-size:11px;color:var(--muted);flex:none;padding-top:1px;width:52px}
  .cal-body{flex:1}
  .cal-body .t{font-size:13px;color:var(--ink)}
  .cal-body .src{font-size:10.5px;color:var(--muted);margin-top:2px}
  .cal-empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 10px}
  .panel-head{
    display:flex;align-items:center;gap:8px;padding:16px 16px 12px;
    border-bottom:1px solid var(--line);
  }
  .panel-head h2{font-size:13px;font-family:var(--mono);letter-spacing:.12em;text-transform:uppercase;font-weight:500;color:var(--muted);flex:1}
  .panel-body{flex:1;overflow-y:auto;padding:10px 12px}
  .arch-item{
    padding:10px 8px;border-bottom:1px solid var(--line);
    display:flex;gap:8px;align-items:flex-start;font-size:13px;
  }
  .arch-text{flex:1}
  .arch-text .txt{text-decoration:line-through;text-decoration-color:var(--muted);color:var(--ink)}
  .arch-meta{display:block;font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:4px}
  .arch-empty{color:var(--muted);font-size:13px;text-align:center;padding:40px 10px}
  .panel-foot{padding:12px 16px;border-top:1px solid var(--line);display:flex;justify-content:flex-end}
  .link-btn{border:none;background:none;box-shadow:none;color:var(--danger);font-size:12px;padding:4px}
  .link-btn:hover{transform:none;box-shadow:none;text-decoration:underline}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important;animation:none !important}
  }

  /* ---------- Zebra assistant ---------- */
  #zbtn{
    position:fixed;left:calc(18px + env(safe-area-inset-left));bottom:calc(18px + env(safe-area-inset-bottom));z-index:6500;
    width:52px;height:52px;border-radius:50%;padding:0;
    background:var(--ink);border:none;box-shadow:var(--shadow-lift);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:transform .2s cubic-bezier(.2,.8,.2,1), box-shadow .2s ease;
  }
  #zbtn:hover{transform:translateY(-2px) scale(1.05)}
  #zbtn:active{transform:scale(.94)}
  #zbtn .stripes{width:26px;height:26px;display:block}
  #zbtn .stripes svg{width:26px;height:26px}
  #zdot{
    position:absolute;top:-2px;right:-2px;width:14px;height:14px;border-radius:50%;
    background:var(--accent);border:2px solid var(--canvas);display:none;
  }
  #zbtn.has-note #zdot{display:block;animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(59,110,79,.5)}
    50%{box-shadow:0 0 0 5px rgba(59,110,79,0)}
  }

  #zchat{
    position:fixed;left:calc(18px + env(safe-area-inset-left));bottom:calc(82px + env(safe-area-inset-bottom));z-index:6500;
    width:340px;max-width:calc(100vw - 36px);height:460px;max-height:70vh;
    background:var(--card);border:1px solid var(--line);border-radius:16px;
    box-shadow:var(--shadow-lift);display:none;flex-direction:column;overflow:hidden;
  }
  #zchat.open{display:flex;animation:chatIn .28s cubic-bezier(.2,.9,.25,1) both;transform-origin:left bottom}
  @keyframes chatIn{
    from{opacity:0;transform:scale(.9) translateY(12px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }
  .zmsg{
    max-width:82%;padding:9px 12px;border-radius:13px;font-size:13.5px;line-height:1.5;
    word-break:break-word;animation:msgIn .26s cubic-bezier(.2,.9,.25,1) both;
  }
  @keyframes msgIn{
    from{opacity:0;transform:translateY(6px)}
    to{opacity:1;transform:translateY(0)}
  }
  .zhead{
    display:flex;align-items:center;gap:10px;padding:14px 14px 12px;
    border-bottom:1px solid var(--line);
  }
  .zhead .zmark{width:30px;height:30px;border-radius:8px;background:var(--ink);display:flex;align-items:center;justify-content:center;flex:none}
  .zhead .zmark svg{width:18px;height:18px}
  .zhead .zname{font-weight:600;font-size:14px;flex:1}
  .zhead .zsub{font-family:var(--mono);font-size:10px;color:var(--muted);display:block;margin-top:1px;font-weight:400}
  .zbody{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
  .zmsg.bot{background:var(--canvas);color:var(--ink);align-self:flex-start;border-bottom-left-radius:4px}
  .zmsg.user{background:var(--ink);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
  .zmsg.typing{color:var(--muted);font-style:italic}
  .zfoot{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--line)}
  .zfoot input{
    flex:1;border:1px solid var(--line);border-radius:10px;padding:9px 12px;
    font:inherit;font-size:13.5px;background:var(--canvas);color:var(--ink);min-width:0;
  }
  .zfoot input:focus{outline:none;border-color:var(--accent)}
  .zfoot button{border:none;background:var(--ink);color:#fff;border-radius:10px;padding:0 14px;font-size:13px}
  .zchip{
    align-self:flex-start;font-size:11px;font-family:var(--mono);color:var(--muted);
    background:var(--canvas);border:1px dashed var(--line);border-radius:8px;padding:6px 9px;
  }

  /* ---------- custom date/time picker ---------- */
  #dtPop{
    position:fixed;z-index:8000;background:var(--card);
    border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow-lift);
    padding:12px;width:230px;display:none;
  }
  #dtPop.open{display:block;animation:popIn .2s cubic-bezier(.2,.9,.25,1) both}
  @keyframes popIn{
    from{opacity:0;transform:scale(.94) translateY(-4px)}
    to{opacity:1;transform:scale(1) translateY(0)}
  }
  #dtPop .dtrow{display:flex;gap:8px;margin-bottom:10px}
  #dtPop label{flex:1;font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
  #dtPop input, #dtPop select{
    width:100%;margin-top:4px;border:1px solid var(--line);border-radius:8px;
    padding:7px 8px;font:inherit;font-size:13px;background:var(--canvas);color:var(--ink);
  }
  #dtPop input:focus, #dtPop select:focus{outline:none;border-color:var(--accent)}
  #dtPop .dtquick{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
  #dtPop .dtquick button{
    font-size:11px;padding:5px 9px;border:1px solid var(--line);background:var(--canvas);
    color:var(--ink);border-radius:7px;box-shadow:none;
  }
  #dtPop .dtquick button:hover{border-color:var(--accent);transform:none;box-shadow:none}
  #dtPop .dtactions{display:flex;justify-content:space-between;align-items:center}
  #dtPop .dtactions .save{background:var(--ink);color:#fff;border:none;padding:7px 16px;border-radius:8px;font-size:13px}
  #dtPop .dtactions .cancel{background:none;border:none;box-shadow:none;color:var(--muted);font-size:12px;padding:6px}
  #dtPop .dtactions .cancel:hover{color:var(--ink);transform:none;box-shadow:none}

  .round-btn{
    width:40px;height:40px;min-width:40px;min-height:40px;flex:none;
    padding:0;border-radius:50%;position:relative;
    background:var(--card);border:1px solid var(--line);color:var(--ink);
    display:flex;align-items:center;justify-content:center;
  }
  .round-btn svg{width:19px;height:19px}
  .round-btn.primary{background:var(--ink);border-color:var(--ink)}
  .round-btn.primary svg{width:20px;height:20px}
  .round-btn:hover{transform:translateY(-1px)}
  .round-btn:active{transform:scale(.94)}
  .round-btn .badge{
    position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;
    border-radius:9px;background:var(--accent);color:#fff;
    font-family:var(--mono);font-size:9.5px;font-weight:600;line-height:16px;
    display:none;box-shadow:0 1px 3px rgba(32,35,34,.25);
  }
  .round-btn .badge.show{display:block}
  /* =====================================================
     MOBILE / TOUCH  (phones, ~640px and below)
     ===================================================== */
  @media (max-width: 640px) {
    /* Cards: fit the screen width, comfortable tap sizing */
    .card{
      width:calc(100vw - 24px);
      max-width:calc(100vw - 24px);
      min-width:0;
    }
    .card-head{padding:14px 12px 6px 16px;}
    .card-title{font-size:16px;}          /* 16px stops iOS auto-zoom on focus */

    /* Bigger tap targets for icons in the card header */
    .icon-btn{width:34px;height:34px;}
    .icon-btn svg{width:18px;height:18px;}

    /* Checkboxes + reminder rows: larger and easier to hit */
    .item{padding:9px 8px;gap:12px;}
    .check{width:22px;height:22px;}
    .check::after{left:6px;top:2px;width:5px;height:9px;}
    .item-text{font-size:15px;padding-top:2px;}
    .add-input{font-size:16px;}           /* prevent zoom-on-focus */
    .date-btn{width:30px;height:30px;}
    .date-btn svg{width:17px;height:17px;}

    /* Resize handle is fiddly on touch — hide it; cards are full-width anyway */
    .resize-handle{display:none;}

    /* Header: round buttons a touch bigger, tighter gaps */
    header{gap:8px;padding-left:calc(12px + env(safe-area-inset-left));padding-right:calc(12px + env(safe-area-inset-right));}
    .round-btn{width:44px;height:44px;min-width:44px;min-height:44px;}
    .round-btn svg{width:21px;height:21px;}
    .brand img{height:26px;}
    .wordmark{font-size:20px;}

    /* Panels go full-width so they're usable on a phone */
    #panel, #calPanel{width:100vw;max-width:100vw;}

    /* Chat window: nearly full screen, easy to type in */
    #zchat{
      width:calc(100vw - 20px);
      max-width:calc(100vw - 20px);
      height:70vh;max-height:70vh;
      left:10px;
      bottom:calc(84px + env(safe-area-inset-bottom));
    }
    .zfoot input{font-size:16px;}         /* prevent zoom */

    /* Chat launcher a bit bigger for thumbs */
    #zbtn{width:58px;height:58px;}
    #zbtn .stripes img{height:34px !important;}

    /* Date popup: center it and size up controls */
    #dtPop{width:min(280px, calc(100vw - 32px));}
    #dtPop input, #dtPop select{font-size:16px;padding:9px 10px;}
    #dtPop .dtquick button{font-size:12px;padding:7px 11px;}
    #dtPop .dtactions .save{padding:9px 20px;font-size:14px;}
  }
</style>
</head>

<script>
(() => {
  const board = document.getElementById('board');
  const emptyMsg = document.getElementById('empty');
  const panel = document.getElementById('panel');
  const archList = document.getElementById('archList');
  const archCount = document.getElementById('archCount');
  const imgInput = document.getElementById('imgInput');

  let state = { cards: [], archive: [], maxZ: 1 };
  let imgTargetCard = null;
  let saveTimer = null;
  const uid = () => Math.random().toString(36).slice(2, 10);

  const PASTELS = ['#FBEAEA','#FDF3E0','#FBF8DC','#E6F2E4','#E1F0EF','#E4ECF7','#ECE6F5','#F7E7F0'];
  const randPastel = () => PASTELS[Math.floor(Math.random() * PASTELS.length)];

  /* ---------------- persistence ----------------
     Three layers, in order of preference:
       1. Cloudflare Worker (syncs laptop <-> iPad)
       2. localStorage (instant local cache + offline)
       3. window.storage (only inside Claude preview)
  */
  const SYNC = {
    url: "https://zebrasync.luckyentry380.workers.dev",
    pass: "aadibob",
    on: true,           // flips off automatically if the Worker is unreachable
  };

  const local = {
    get(k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
    set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
  };

  async function cloudGet(k) {
    if (!SYNC.on) return null;
    try {
      const r = await fetch(SYNC.url + "?key=" + encodeURIComponent(k), {
        headers: { "X-Zebra-Pass": SYNC.pass },
      });
      if (!r.ok) throw new Error("status " + r.status);
      const data = await r.json();
      return data.value ?? null;
    } catch (e) {
      console.warn("Zebra sync (get) unavailable, using local copy.", e);
      return null;
    }
  }
  async function cloudSet(k, v) {
    if (!SYNC.on) return;
    setSyncStatus("saving");
    try {
      await fetch(SYNC.url + "?key=" + encodeURIComponent(k), {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Zebra-Pass": SYNC.pass },
        body: JSON.stringify({ value: v }),
      });
      setSyncStatus("ok");
    } catch (e) {
      console.warn("Zebra sync (set) failed, saved locally.", e);
      setSyncStatus("offline");
    }
  }

  const store = {
    // returns cloud value if available, otherwise local, otherwise Claude storage
    async get(k) {
      const cloud = await cloudGet(k);
      if (cloud !== null && cloud !== undefined) {
        local.set(k, cloud);       // refresh local cache with newest cloud copy
        return cloud;
      }
      const l = local.get(k);
      if (l !== null && l !== undefined) return l;
      try {
        if (window.storage) { const r = await window.storage.get(k); return r ? r.value : null; }
      } catch (e) {}
      return null;
    },
    // write local instantly, push to cloud in the background
    async set(k, v) {
      local.set(k, v);
      try { if (window.storage) await window.storage.set(k, v); } catch (e) {}
      cloudSet(k, v);
    }
  };

  function setSyncStatus(state) {
    const dot = document.getElementById('syncDot');
    if (!dot) return;
    dot.classList.remove('ok', 'saving', 'offline');
    if (state) dot.classList.add(state);
    dot.title = state === 'ok' ? 'Synced' : state === 'saving' ? 'Saving…' : state === 'offline' ? 'Offline — saved locally' : 'Sync';
  }

  async function load() {
    try {
      const raw = await store.get('board-v1');
      if (raw) state = JSON.parse(raw);
    } catch (e) { /* first run — nothing saved yet */ }
    renderAll();
  }
  function save() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => store.set('board-v1', JSON.stringify(state)), 350);
  }

  /* ---------------- rendering ---------------- */
  function renderAll() {
    board.innerHTML = '';
    state.cards.forEach(c => board.appendChild(buildCard(c)));
    updateEmpty();
    renderArchive();
    renderCalendar();
  }
  function updateEmpty() { emptyMsg.hidden = state.cards.length > 0; }

  function buildCard(c) {
    const el = document.createElement('div');
    el.className = 'card';
    el.dataset.id = c.id;
    el.style.left = c.x + 'px';
    el.style.top = c.y + 'px';
    el.style.zIndex = c.z || 1;
    el.style.background = c.color || (c.color = randPastel());

    /* head */
    const head = document.createElement('div');
    head.className = 'card-head';

    const title = document.createElement('input');
    title.className = 'card-title';
    title.placeholder = 'Untitled';
    title.value = c.title || '';
    title.addEventListener('input', () => { c.title = title.value; save(); });

    const imgBtn = iconBtn('M4 17l5-5 4 4 3-3 4 4 M4 5h16v14H4z', 'Add image', () => {
      imgTargetCard = c; imgInput.click();
    });
    const peek = document.createElement('div');
    peek.className = 'peek';
    const peekBtn = iconBtn('M6 9l6 6 6-6', 'Show checked-off', () => {
      peek.classList.toggle('open');
      if (peek.classList.contains('open')) renderPeek(c, peek);
    });
    const delBtn = iconBtn('M6 6l12 12M18 6L6 18', 'Delete card', () => confirmDelete(delBtn, c));

    head.append(title, peekBtn, imgBtn, delBtn);
    el.appendChild(head);

    /* scrollable body */
    const scroll = document.createElement('div');
    scroll.className = 'card-scroll';

    /* image */
    if (c.img) {
      const wrap = document.createElement('div');
      wrap.className = 'card-img-wrap';
      const img = document.createElement('img');
      img.src = c.img; img.alt = c.title || 'Card image';
      const rm = iconBtn('M6 6l12 12M18 6L6 18', 'Remove image', () => { c.img = null; save(); refreshCard(c); });
      rm.classList.add('img-remove');
      wrap.append(img, rm);
      scroll.appendChild(wrap);
    }

    /* items */
    const ul = document.createElement('ul');
    ul.className = 'items';
    c.items.forEach(it => ul.appendChild(buildItem(c, it)));
    scroll.appendChild(ul);

    /* per-card peek (checked-off) */
    scroll.appendChild(peek);

    /* add row */
    const row = document.createElement('div');
    row.className = 'add-row';
    const dash = document.createElement('span');
    dash.className = 'dash'; dash.textContent = '+';
    const input = document.createElement('input');
    input.className = 'add-input';
    input.placeholder = 'Add a reminder…';
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && input.value.trim()) {
        const it = { id: uid(), text: input.value.trim() };
        c.items.push(it);
        ul.appendChild(buildItem(c, it));
        input.value = '';
        save();
      }
    });
    row.append(dash, input);
    scroll.appendChild(row);

    el.appendChild(scroll);

    /* resize handle */
    const rh = document.createElement('div');
    rh.className = 'resize-handle';
    rh.innerHTML = '<svg viewBox="0 0 24 24"><path d="M20 8L8 20M20 14l-6 6"/></svg>';
    el.appendChild(rh);
    if (c.w) el.style.width = c.w + 'px';
    if (c.h) el.style.height = c.h + 'px';
    enableResize(rh, el, c);

    enableDrag(el, c);
    return el;
  }

  function renderPeek(c, peek) {
    const done = state.archive.filter(a => a.cardId === c.id);
    peek.innerHTML = '';
    if (!done.length) {
      peek.innerHTML = '<div class="peek-empty">Nothing checked off yet.</div>';
      return;
    }
    done.forEach(a => {
      const row = document.createElement('div');
      row.className = 'peek-row';
      const txt = document.createElement('span');
      txt.className = 'txt'; txt.textContent = a.text;
      const restore = iconBtn('M4 10h11a5 5 0 1 1 0 10h-6 M4 10l5-5M4 10l5 5', 'Restore', () => {
        state.archive = state.archive.filter(x => x.id !== a.id);
        c.items.push({ id: a.id, text: a.text });
        save(); refreshCard(c); renderArchive();
      });
      row.append(txt, restore);
      peek.appendChild(row);
    });
  }

  function enableResize(handle, el, c) {
    handle.addEventListener('pointerdown', e => {
      e.preventDefault(); e.stopPropagation();
      handle.setPointerCapture(e.pointerId);
      const sx = e.clientX, sy = e.clientY;
      const sw = el.offsetWidth, sh = el.offsetHeight;
      const move = ev => {
        c.w = Math.max(200, Math.min(560, sw + (ev.clientX - sx)));
        c.h = Math.max(90, sh + (ev.clientY - sy));
        el.style.width = c.w + 'px';
        el.style.height = c.h + 'px';
      };
      const up = () => {
        handle.removeEventListener('pointermove', move);
        handle.removeEventListener('pointerup', up);
        save();
      };
      handle.addEventListener('pointermove', move);
      handle.addEventListener('pointerup', up);
    });
  }

  function buildItem(c, it) {
    const li = document.createElement('li');
    li.className = 'item';
    const chk = document.createElement('button');
    chk.className = 'check';
    chk.title = 'Check off';
    chk.setAttribute('aria-label', 'Check off: ' + it.text);

    const main = document.createElement('div');
    main.className = 'item-main';
    const topRow = document.createElement('div');
    topRow.className = 'item-row';
    const txt = document.createElement('span');
    txt.className = 'item-text';
    txt.textContent = it.text;

    const dateBtn = document.createElement('button');
    dateBtn.className = 'date-btn' + (it.due ? ' set' : '');
    dateBtn.title = it.due ? 'Change date & time' : 'Add date & time';
    dateBtn.setAttribute('aria-label', 'Set date and time');

  /* ---- date helpers: custom popup (works identically on every device) ---- */
  const dtPop = document.getElementById('dtPop');

  const dtTime = document.getElementById('dtTime');
  let dtCallback = null;

  function pickDate(current, cb, anchor) {
    dtCallback = cb;
    const base = current ? new Date(current) : (() => { const d = new Date(); d.setHours(d.getHours()+1, 0, 0, 0); return d; })();
    const p = n => String(n).padStart(2, '0');
    dtDate.value = base.getFullYear() + '-' + p(base.getMonth()+1) + '-' + p(base.getDate());
    dtTime.value = p(base.getHours()) + ':' + p(base.getMinutes());

    dtPop.classList.add('open');
    // position near the anchor, clamped to viewport
    const pw = 230, ph = dtPop.offsetHeight || 220;
    let left = 100, top = 100;
    if (anchor) {
      const r = anchor.getBoundingClientRect();
      left = Math.min(window.innerWidth - pw - 8, Math.max(8, r.left - pw + 24));
      top = r.bottom + 6;
      if (top + ph > window.innerHeight - 8) top = Math.max(8, r.top - ph - 6);
    }
    dtPop.style.left = left + 'px';
    dtPop.style.top = top + 'px';
  }

  function closeDtPop() { dtPop.classList.remove('open'); dtCallback = null; }

  document.getElementById('dtSave').addEventListener('click', () => {
    if (!dtDate.value) { closeDtPop(); return; }
    const timeStr = dtTime.value || '09:00';

    const cb = dtCallback;
    closeDtPop();
    if (cb && !isNaN(ts)) cb(ts);

      else if (q === 'week') { d.setDate(d.getDate()+7); d.setHours(9, 0, 0, 0); }
      const p = n => String(n).padStart(2, '0');
      dtDate.value = d.getFullYear() + '-' + p(d.getMonth()+1) + '-' + p(d.getDate());

  function dueInfo(ts) {
    const d = new Date(ts), now = new Date();
    const day = new Date(d); day.setHours(0,0,0,0);
    const today = new Date(now); today.setHours(0,0,0,0);
    const diffDays = Math.round((day - today) / 86400000);
    let dayLabel;
    if (diffDays === 0) dayLabel = 'Today';
    else if (diffDays === 1) dayLabel = 'Tomorrow';
    else if (diffDays === -1) dayLabel = 'Yesterday';
    else dayLabel = d.toLocaleDateString([], {month:'short', day:'numeric'});
    const time = d.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
    let cls = '';
    if (ts < now.getTime()) cls = 'over';
    else if (diffDays <= 1) cls = 'soon';
    return { label: dayLabel + ' · ' + time, cls };
  }

  /* ---------------- drag ---------------- */
  function enableDrag(el, c) {
    el.addEventListener('pointerdown', e => {
      c.z = ++state.maxZ;
      el.style.zIndex = c.z;
      const t = e.target;
      if (t.closest('button') || t.closest('input') || t.closest('.resize-handle')) { save(); return; }
      // drag only from the card header grip
      if (!t.closest('.card-head')) { save(); return; }
      e.preventDefault();
      el.setPointerCapture(e.pointerId);
      el.classList.add('dragging');
      const sx = e.clientX - c.x, sy = e.clientY - c.y;
      const move = ev => {
        const cw = el.offsetWidth, ch = el.offsetHeight;
        const headH = 60; // keep below header
        // keep most of the card on-screen: at least 60px always reachable
        const maxX = window.innerWidth - Math.min(cw, 100);
        const maxY = window.innerHeight - 44;
        c.x = Math.max(0, Math.min(maxX, ev.clientX - sx));
        c.y = Math.max(headH, Math.min(maxY, ev.clientY - sy));
        el.style.left = c.x + 'px';
        el.style.top = c.y + 'px';
      };
      const up = () => {
        el.classList.remove('dragging');
        el.removeEventListener('pointermove', move);
        el.removeEventListener('pointerup', up);
        save();
      };
      el.addEventListener('pointermove', move);
      el.addEventListener('pointerup', up);
    });
  }

      const img = new Image();
      img.onload = () => {
        const max = 640;
        const scale = Math.min(1, max / img.width);
        const cv = document.createElement('canvas');
        cv.width = Math.round(img.width * scale);
        cv.height = Math.round(img.height * scale);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        imgTargetCard.img = cv.toDataURL('image/jpeg', 0.8);
        refreshCard(imgTargetCard);

  /* collect all dated, still-active reminders across cards, sorted by due */
  function collectDated() {
    const out = [];
    state.cards.forEach(c => c.items.forEach(it => {
      if (it.due) out.push({ due: it.due, text: it.text, card: c.title || 'Untitled', cardId: c.id });
    }));
    return out.sort((a, b) => a.due - b.due);
  }

  function renderCalendar() {
    const items = collectDated();
    calCount.textContent = items.length ? items.length : '';
    calCount.classList.toggle('show', items.length > 0);
    if (!calList) return;
    calList.innerHTML = '';

      calList.innerHTML = '<div class="cal-empty">No dated reminders yet.<br>Tap the 🗓 icon on any reminder to schedule it.</div>';
      return;
    }
    const now = Date.now();
    let lastKey = '';
    items.forEach(it => {
      const d = new Date(it.due);
      const key = d.toDateString();
      if (key !== lastKey) {
        lastKey = key;
        const dayWrap = document.createElement('div');
        dayWrap.className = 'cal-day';
        const h = document.createElement('h3');
        h.textContent = dayHeading(d);
        dayWrap.appendChild(h);

      const row = document.createElement('div');

        '<div class="cal-body"><div class="t"></div><div class="src"></div></div>';
      row.querySelector('.t').textContent = it.text;
      row.querySelector('.src').textContent = '↳ ' + it.card;
      row.addEventListener('click', () => {
        calPanel.classList.remove('open');

      });

  function dayHeading(d) {
    const day = new Date(d); day.setHours(0,0,0,0);
    const today = new Date(); today.setHours(0,0,0,0);
    const diff = Math.round((day - today) / 86400000);
    let prefix = '';
    if (diff === 0) prefix = 'Today · ';
    else if (diff === 1) prefix = 'Tomorrow · ';
    else if (diff === -1) prefix = 'Yesterday · ';
    else if (diff < 0) prefix = 'Overdue · ';
    return prefix + d.toLocaleDateString([], {weekday:'short', month:'short', day:'numeric'});
  }

  function flashCard(cardId) {
    const c = state.cards.find(x => x.id === cardId);
    if (!c) return;
    c.z = ++state.maxZ;
    const el = document.querySelector('.card[data-id="' + cardId + '"]');
    if (!el) return;
    el.style.zIndex = c.z;
    el.animate([

      { boxShadow: 'var(--shadow)' }

  /* ================= ZEBRA ASSISTANT ================= */
  const zbtn = document.getElementById('zbtn');

  // conversation history persists across sessions
  let chat = [];

  function snapshot() {
    // Build a compact picture of the user's world for the assistant to learn from.
    const active = [];
    state.cards.forEach(c => c.items.forEach(it => {
      active.push({ card: c.title || 'Untitled', text: it.text,
        due: it.due ? new Date(it.due).toLocaleString([], {weekday:'short', month:'short', day:'numeric', hour:'numeric', minute:'2-digit'}) : null });
    }));

  function addMsg(role, text) {

  async function loadChat() {
    try {
      const raw = await store.get('zebra-chat-v1');
      if (raw) chat = JSON.parse(raw);
    } catch (e) {}
    zbody.innerHTML = '';
    if (!chat.length) {
      addMsg('bot', "Hi! I'm Zebra 🦓 I keep an eye on your reminders and learn what matters to you. Ask me what's coming up, what to focus on, or just say hi.");
    } else {
      chat.forEach(m => addMsg(m.role, m.content));
    }
  }
  function saveChat() {
    // keep last 30 turns to stay light
    if (chat.length > 30) chat = chat.slice(-30);
    store.set('zebra-chat-v1', JSON.stringify(chat));
  }
  function clearChat() {
    chat = [];
    store.set('zebra-chat-v1', JSON.stringify(chat));

    addMsg('bot', "Hi! I'm Zebra 🦓 I keep an eye on your reminders and learn what matters to you. Ask me what's coming up, what to focus on, or just say hi.");
  }

  const SYSTEM = "You are Zebra, a warm, concise personal assistant living inside the user's reminder app. " +
    "You help with day-to-day planning and gently learn the user's habits, interests, and priorities from their reminders. " +
    "You are given a live snapshot of their cards, active reminders (with due dates), and recently completed items. " +
    "Use it to notice patterns (what they care about, recurring themes, busy days) and give specific, friendly help. " +
    "Keep replies short (1-4 sentences) unless asked for more. Never invent reminders they don't have.";

  // Zebra's AI is served by a Cloudflare Worker that holds the Anthropic key
  // secretly. Fill in AI_URL after you deploy the AI Worker.
  const AI = {
    url: "https://zebra-ai.luckyentry380.workers.dev",   // Cloudflare Workers AI
    pass: "aadibob",                        // matches your sync passphrase
  };

  async function askZebra(userText) {
    const typing = addMsg('bot', 'Zebra is thinking…');
    typing.classList.add('typing');
    const context = "Here is the user's current reminder snapshot (JSON):\n" + JSON.stringify(snapshot());

    // If the AI Worker URL isn't set yet, go straight to the offline brain.
    if (!AI.url || AI.url.indexOf("PASTE_") === 0) {
      typing.remove();
      addMsg('bot', localZebra(userText));
      chat.push({ role: 'assistant', content: '' }); // keep turn count sane
      chat.pop();
      saveChat();
      return;
    }

    try {
      const res = await fetch(AI.url, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Zebra-Pass": AI.pass },
        body: JSON.stringify({
          messages: [...chat.slice(-12).map(m => ({ role: m.role, content: m.content })),
                     { role: "user", content: userText }],
          context: context,
        }),
      });
      if (!res.ok) throw new Error('status ' + res.status);
      const data = await res.json();
      const reply = (data.reply || "").trim() || "Hmm, I didn't catch that — try again?";
      typing.remove();
      addMsg('bot', reply);
      chat.push({ role: 'assistant', content: reply });
      saveChat();
    } catch (e) {
      typing.remove();
      addMsg('bot', localZebra(userText));
      saveChat();
    }
  }

  // Offline brain — used when the AI API isn't reachable (e.g. hosted on GitHub Pages).
  function localZebra(q) {
    const s = snapshot();
    const ql = q.toLowerCase();
    const now = Date.now();
    const dated = [];
    state.cards.forEach(c => c.items.forEach(it => { if (it.due) dated.push({ ...it, card: c.title || 'Untitled' }); }));
    dated.sort((a, b) => a.due - b.due);

    if (/hi|hello|hey|yo\b/.test(ql))
      return "Hey! 🦓 You've got " + s.active.length + " active reminder" + (s.active.length===1?'':'s') + " right now. Want me to run through what's coming up?";
    if (/overdue|late|past/.test(ql)) {
      const over = dated.filter(d => d.due < now);
      return over.length ? "Overdue: " + over.map(d => d.text + ' (' + d.card + ')').join('; ') + "." : "Nothing overdue — you're on top of it! 🎉";
    }
    if (/today|now|next|upcoming|coming|due|schedule|when/.test(ql)) {
      const soon = dated.filter(d => d.due >= now).slice(0, 5);
      return soon.length ? "Next up: " + soon.map(d => d.text + ' — ' + new Date(d.due).toLocaleString([], {weekday:'short', hour:'numeric', minute:'2-digit'})).join('; ') + "." : "No dated reminders ahead. Add times with the 🗓 icon and I'll track them.";
    }
    if (/focus|priority|important|should i|what.*do/.test(ql)) {
      if (dated.length) return "I'd start with \"" + dated[0].text + "\" from " + dated[0].card + " — it's your soonest deadline.";
      return s.active.length ? "You have " + s.active.length + " open items. Try tackling the one on \"" + s.cardTitles[0] + "\" first." : "Nothing on your plate — enjoy the breathing room!";
    }
    if (/like|interest|about me|know|learn|pattern/.test(ql)) {
      const words = {};
      [...s.active, ...s.completed].forEach(i => (i.text||'').toLowerCase().split(/\W+/).forEach(w => { if (w.length>3) words[w]=(words[w]||0)+1; }));
      const top = Object.entries(words).sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>x[0]);
      return top.length ? "From your reminders, you seem to focus on: " + top.join(', ') + ". I keep noticing these come up!" : "I'm still learning — add a few reminders and I'll pick up on what matters to you.";
    }
    if (/how many|count|list/.test(ql))
      return "You've got " + s.active.length + " active across " + s.cardTitles.length + " card" + (s.cardTitles.length===1?'':'s') + ", and " + s.completed.length + " recently done.";
    return "I'm running in offline mode right now, so I can still help with your reminders — try asking what's due, what's overdue, or what to focus on. 🦓";
  }

  // When you return to the app (tab focus / reopen), pull the latest board

  async function refreshFromCloud() {
    if (!SYNC.on) return;
    // avoid hammering: only if it's been >3s since last pull
    if (Date.now() - lastPull < 3000) return;
    lastPull = Date.now();
    const raw = await cloudGet('board-v1');
    if (raw) {
      try {
        const incoming = JSON.stringify(JSON.parse(raw));
        const current = JSON.stringify(state);
        if (incoming !== current) {
          state = JSON.parse(raw);
          local.set('board-v1', raw);
          renderAll();
          setSyncStatus('ok');
        }
      } catch (e) {}
    }
  }
  document.addEventListener('visibilitychange', () => { if (!document.hidden) refreshFromCloud(); });
  window.addEventListener('focus', refreshFromCloud);
})();
</script>
</body>
